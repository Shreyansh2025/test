kind = "web"
  previewPath = "/"
  title = "AI Tutor"
  version = "1.0.0"
  id = "artifacts/mathtutor"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 19626

  [services.development]
  run = "pnpm --filter @workspace/mathtutor run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/mathtutor", "run", "build" ]
  publicDir = "artifacts/mathtutor/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "19626"
  BASE_PATH = "/"
  